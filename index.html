<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beingstattracker</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="home-page">
  <main class="home-container">
    <h1 class="logo">Beingstattracker</h1>
    <p class="tagline">Dota 2 Tournament Stats</p>

    <form class="search-form" id="searchForm">
      <div class="search-box">
        <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input
          type="text"
          id="leagueInput"
          class="search-input"
          placeholder="Paste Dotabuff league URL..."
          autocomplete="off"
          autofocus
        />
      </div>
      <button type="submit" class="search-btn">Load Tournament</button>
    </form>

    <div class="options-row">
      <label class="options-label" for="maxPagesInput">
        Scrape up to
        <input type="number" id="maxPagesInput" class="pages-input" min="1" max="99" placeholder="auto" />
        pages &nbsp;<span class="options-hint">(leave blank to auto-detect)</span>
      </label>
    </div>

    <p class="hint">e.g. https://www.dotabuff.com/esports/leagues/17081-reincarnation-...</p>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
